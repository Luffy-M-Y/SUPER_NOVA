<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WiFi Scanner</title>

  <!-- Police Google Fonts chargée depuis le web -->
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet"/>

  <!-- Lien vers notre fichier CSS séparé.
       Le navigateur charge style.css ET index.html en même temps. -->
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>

  <!--
    STRUCTURE HTML — colonne vertébrale de la page.
    Tout est dans .card. L'ordre des éléments ici = ordre visuel à l'écran.
  -->
  <div class="card">

    <!-- Top bar : titre à gauche, indicateur READY à droite -->
    <div class="topbar">
      <span class="app-title">WiFi Scanner</span>
      <span class="status">
        <span class="dot"></span>
        READY
      </span>
    </div>

    <!-- Bouton principal — app.js écoute le clic via addEventListener -->
    <button id="btn-scan">
      <span class="radar-icon"></span>
      SCAN NETWORK
    </button>

    <!-- Message d'erreur — caché par défaut (display:none dans style.css).
         Affiché par app.js si data.error existe ou si fetch() échoue. -->
    <p id="error-msg"></p>

    <!-- Panel résultats — caché par défaut (display:none dans style.css).
         app.js le rend visible UNIQUEMENT après un scan réussi.
         Les id="val-*" sont les cibles que JS va remplir avec data.ssid etc. -->
    <div id="result-panel">
      <div class="result-row">
        <span class="r-label">SSID</span>
        <span class="r-val" id="val-ssid">—</span>          <!-- rempli par: data.ssid -->
      </div>
      <div class="result-row">
        <span class="r-label">PASSWORD</span>
        <span class="r-val password" id="val-pass">—</span> <!-- rempli par: data.password -->
      </div>
      <div class="result-row">
        <span class="r-label">SECURITY</span>
        <span class="r-val" id="val-sec">—</span>           <!-- rempli par: data.security -->
      </div>
    </div>

    <!-- Footer : barres de signal + version -->
    <div class="footer">
      <div class="signal-bars" id="signal">
        <span></span><span></span><span></span><span></span>
      </div>
      <span class="meta">localhost:5000 · v1.0</span>
    </div>

  </div>

  <!-- Script chargé EN FIN de body.
       Pourquoi ici et pas dans <head> ?
       Le HTML est lu de haut en bas. Si on met le script dans <head>,
       il s'exécute avant que les éléments (btn, panel...) existent dans la page.
       En bas du body, tous les éléments sont déjà chargés quand JS s'exécute. -->
  <script src="/static/app.js"></script>

</body>
</html>
